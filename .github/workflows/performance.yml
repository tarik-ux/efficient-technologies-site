name: Performance contract

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate production performance contract
        env:
          SITE_ROOT: .
        run: node --test .github/scripts/performance-contract.test.mjs
